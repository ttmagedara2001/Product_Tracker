<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer hex background -->
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18"
    fill="#F59E0B" />
  <!-- Inner hex ring -->
  <polygon points="32,11 51,21.5 51,42.5 32,53 13,42.5 13,21.5"
    fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
  <!-- Honeycomb mini cells -->
  <g fill="none" stroke="#92400E" stroke-width="1.2" stroke-opacity="0.55">
    <!-- top row -->
    <polygon points="32,14 40,18.5 40,27.5 32,32 24,27.5 24,18.5"/>
    <!-- bottom-left -->
    <polygon points="22,30 30,34.5 30,43.5 22,48 14,43.5 14,34.5"/>
    <!-- bottom-right -->
    <polygon points="42,30 50,34.5 50,43.5 42,48 34,43.5 34,34.5"/>
  </g>
  <!-- Bee body (amber) -->
  <ellipse cx="32" cy="33" rx="5" ry="4" fill="#78350F"/>
  <rect x="28" y="31.5" width="8" height="1.5" rx="0.75" fill="#FDE68A" opacity="0.9"/>
  <rect x="28" y="34" width="8" height="1.2" rx="0.6"  fill="#FDE68A" opacity="0.7"/>
  <!-- Head -->
  <circle cx="32" cy="27.5" r="3" fill="#78350F"/>
  <!-- Wings -->
  <ellipse cx="26" cy="28" rx="4.5" ry="2" fill="white" opacity="0.65" transform="rotate(-25 26 28)"/>
  <ellipse cx="38" cy="28" rx="4.5" ry="2" fill="white" opacity="0.65" transform="rotate(25 38 28)"/>
</svg>